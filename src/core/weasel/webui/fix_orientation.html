<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="shared/panel.css">
<style>
  .rotate-row {
    display: flex;
    justify-content: center;
    gap: 18px;
    padding: 4px 0;
  }
  .icon-btn {
    width: 40px;
    height: 40px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 22px;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    line-height: 1;
  }
  .icon-btn:hover { border-color: #666; }
  .icon-btn:active { background: #eee; }

  .indicator-row {
    display: flex;
    justify-content: center;
    padding: 10px 0 6px;
  }
  .arrow {
    width: 36px;
    height: 36px;
    transition: transform 0.2s;
    color: var(--text);
  }

  .center-row {
    display: flex;
    justify-content: center;
    padding: 4px 0;
  }
</style>
</head>
<body>

<div class="panel-centered">
  <div class="section-header" style="text-align: center; padding-top: 4px;">Rotate</div>

  <div class="rotate-row">
    <button class="icon-btn" id="rotate-left-btn" title="Rotate counter-clockwise">↺</button>
    <button class="icon-btn" id="rotate-right-btn" title="Rotate clockwise">↻</button>
  </div>

  <div class="indicator-row">
    <svg class="arrow" id="rotation-arrow" viewBox="0 0 36 36">
      <line x1="18" y1="6" x2="18" y2="30" stroke="currentColor" stroke-width="2"/>
      <polyline points="10,14 18,6 26,14" stroke="currentColor" stroke-width="2" fill="none"/>
    </svg>
  </div>

  <div class="center-row">
    <button class="btn" id="reset-btn">Reset</button>
  </div>

  <div class="center-row" style="padding-top: 12px;">
    <button class="btn" id="apply-btn">Apply to ...</button>
  </div>
</div>

<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
<script src="shared/panel.js"></script>
<script>
  function setRotation(deg) {
    document.getElementById('rotation-arrow').style.transform = 'rotate(' + deg + 'deg)';
  }

  Panel.setupButton('rotate-left-btn', 'rotateLeft');
  Panel.setupButton('rotate-right-btn', 'rotateRight');
  Panel.setupButton('reset-btn', 'reset');
  Panel.setupButton('apply-btn', 'apply');

  Panel.init(function(bridge) {
    if (bridge.valuesChanged) {
      bridge.valuesChanged.connect(function(values) {
        if (values.rotation !== undefined) setRotation(values.rotation);
      });
    }
  });
</script>

</body>
</html>
